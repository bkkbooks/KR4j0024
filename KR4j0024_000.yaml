body:
  text: 坦菴詞詞曲類一詞集之屬提要臣等謹案坦菴詞一卷宋趙師使撰師使字介之燕王德昭七世孫集中有和葉夢得徐俯二詞蓋南宋初人也案陳振孫書録解題載坦菴長短句一卷稱趙師俠撰陳景沂全芳備祖載梅花五言一絶亦稱師俠與此本互異未詳孰是蓋二字點畫相近猶之田肯田宵史傳亦姑兩存耳毛晉刋本謂師使一名師俠則似其人本有兩名非事實也是集前有其門人尹覺序云坦菴為文如泉出不擇地詞章乃其餘事其摸寫體狀雖極精巧皆本情性之自然今觀其集蕭踈淡逺不肯為剪紅刻翠之文洵詞中之髙格但微傷率易是其所偏師使嘗舉進士其宦遊所及繫以甲子見於各詞注中者尚可指數大約始於丁亥而終於了已其地為益陽豫章栁州宜春信豐瀟湘衡陽莆中長沙其資階則不可詳考矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀坦菴詞原序詞古詩流也吟咏情性莫工於詞臨淄六一當代文伯其樂府猶有憐景泥情之偏豈情之所鍾不能自已於言耶坦菴先生金閨之彥性天夷曠吐而為文如泉出不擇地連收兩科如俯拾芥詞章乃其餘事人見其摸寫風景體狀物態俱極精巧初不知得之之易以至得趣忘憂樂天知命兹又情性之自然也因為編次俾鋟諸朩觀者當自識其胸次云門人尹覺先之敘
