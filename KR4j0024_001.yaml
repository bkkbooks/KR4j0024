body:
  text: 坦菴詞宋趙師使撰萬年歡電繞神樞華渚流虹誕彌良用佳辰萬㝢謳歌歸舞寶厯璔新四七年間盛事皇威暢邊鄙無塵仁恩被華夏咸安太平極治歡聲重華道隆德茂亘古今希有揖遜重聞聖子三宫歡聚兩世慈親幸際千秋聖旦霑鎬宴普率惟均封人祝億萬斯年壽皇尊並高真水調歌頭龍帥宴王公明金鼎調元手玉殿渙恩華宣威蜀道曾見千騎擁高牙慿仗元樞籌略寬我宸旒西顧惠澤被幽遐為憶江城好南浦艤仙槎格天心膺帝眷極褒嘉琳宫香火緣在還近玉皇家霖雨久思賢佐看即聲傳丹禁喚仗聽宣麻衮繡公歸去宰路築隄沙又春野亭送别江亭送行客腸斷朩蘭舟水高風快滿目烟樹織成愁咿軋數聲柔櫓拍塞一懷離恨指顧隔汀洲獨立蒼茫外欲去强遲留海山長雲水濶思難收小亭深院歌笑不忍記同游惟有當時明月千里有情還共後㑹尚悠悠此恨無重數和淚付東流又癸卯信豐送春韶華能幾許節物歎推移羣花競芳爭豔無奈隙駒馳紅紫隨風何處惟有摶枝新緑暗逐雨催肥喬朩鶯初囀深院燕交飛漸清和微扇暑日遲遲新荷泛水搖漾萍藻弄晴漪百嵗光隂難挽一笑歡娛易失莫惜酒盈巵無計留連住還是送春歸又萬載烟雨觀江流清淺外山色有無中平田坡岸回曲一目望難窮波面輕鷗容與沙際野航橫渡不信畫圖工路入神仙宅翠鎖梵王宫俯晴郊增勝槩氣橫空雲林城市層列知有幾重重更上危亭高處徙倚闌干虛敞象緯逼璇穹要盡無邊景烟雨看空濛又戊申舂陵用舊韻賦二詞呈族守德逺人生如寄耳世態逐時移浮名薄利能幾方寸謾交馳粗足生涯隨分到眼風光可樂終不羡輕肥有志但長嘆無路且卑飛恨年華何去速又來遲緑隂濃映池沼縠浪皺風漪囀午鶯聲睍睆滚地楊花飄蕩愛景惜芳巵此意誰能解一笑任春歸又心景兩無著情物豈能移超然逺覽失笑名利苦紛馳一品官資榮顯百萬金珠豪富空自喜家肥㑹得箇中理川湧與雲飛靜中樂閒中趣自舒遲心如止水無風無自更生漪巳是都忘人我一任吾身醒醉有酒引連巵萬法無差别融解即同歸又和石林韻世態萬紛變人事一何忙胸中素韜奇蘊匣劍豈能藏不向燕然紀績便與漁樵爭席擺脫是非鄉要地時難得閒處日偏長志橫秋謀奪衆謾軒昻蠅頭蝸角微利爭較一毫芒幸有喬林修竹隨分粗衣糲食何必計冠裳我已樂蕭散誰與共平章又丁已長沙壽王樞使台星明翼軫和氣滿瀟湘長懷勝處地靈應産股肱良共仰三朝元老要識一時英傑人物自堂堂直氣薄霄漢德望聳巖廊擁貔貅森棨㦸鎮藩方折衝樽爼春融花栁侑壺觴兩世麟符玉節九郡恩風惠雨仁者壽宜長鳯詔來丹闕繡衮覲明光滿江紅甲午豫章和李思永渺渺春江迷望眼蒲萄漲緑春過也蕭疏庭戶寂寥心目念逺不禁啼鴂鬧愁多易遣修蛾蹙向小窗時把綵箋看翻新曲晴晝永便新浴相思淚不成哭空無言憔悴暗銷肌玉目斷碧雲無信息試慿青翼飛南北聽掀簾疑是故人來風敲竹又辛丑赴信豐舟行贛石中烟浪連天寒尚峭空濛細雨春去也紅銷芳徑緑肥江樹山色雲籠迷逺近灘聲水滿忘囏阻挂片帆掠岸晚風輕停烟渚浮世事皆如許名利役驚時序歎清明寒食小舟為旅露宿風餐安所賦石泉槐火知何處動歸心猶賴翠烟中無杜宇又壬子秋社莆中賦桃花露冷天高秋氣爽千林葉落驚初見小桃枝上盛開紅萼淺淡胭脂經雨洗剪裁瑪瑙如雲薄問素商何事鬭春工施丹雘芙蓉苑顔如灼曾暗與花王約要乘秋名字並傳京雒回首瑤池高宴處桂花香裏驂高鶴但莫教容易逐西風輕飄郤又丙辰中秋定王臺即席餞富次律凉入三湘秋氣爽江澄沙白人欲去離愁黯黯莫留行色盍在中朝陪鵷鷺暫來南楚分風月與元樞鶚薦共扶搖朝天闕皇華使和戎䇿西府贊中興業有緇衣同美武公勛烈檣燕已知添别意驪駒誰為歌新闋恨此情如月過中秋圓還缺又丁巳和濟時兒宜送春去去春光留不住情懷索莫那堪是日長人困雨餘寒薄葉底青青梅勝豆枝頭顆顆花留蕚歎流年空有惜春心憑春酌歌共酒誰酬酢非與是忘今昨且隨時隨分强歡尋樂世事燕鴻南北去人生烏兔東西落問故園不負送春期明年約沁園春和伍子嚴避暑二首雨接梅霖風袪槐暑麥天已秋正榴燃紅炬枝頭色豔荷翻緑蓋池面香浮心景俱清身名何有且向忙中早轉頭塵勞事枉朝思夕計細慮深謀悠悠不復徼求但安分隨緣休便休縱官居極品徒為美玩家稱巨富未免間愁遇酒開顔逢歡樂意有似朩人騎土牛從他笑看一朝解悟八極遨遊又羊角飄塵金烏爍石雨凉念秋有虛堂臨水披襟散髮紗㡡霧卷湘簟波浮逺列雲峯近參荷氣卧看丈書琴枕頭蟬聲寂向莊周夢裏栩栩無謀茶甌醒困堪求粗飽飯安居可以休算翛閒靜勝吾能自樂榮華紛擾人謾多愁習孏非癡覺迷是病一力那能勝九牛但休問且追尋觴詠知友從游酬江月題趙文炳枕屏枕山平逺記當年小閣牙床曾展圍幅高深春晝永寂寂重簾不卷櫂艤西湖人歸南陌酒暈紅生臉困來無那玉肌小倚嬌軟堪恨身在天涯曲屏環枕此意何由見想像高唐無夢到獨擁閒衾展轉物是人非山長水濶觸處思量遍愁遮不斷夜闌依舊斜掩又丙午螺川飄流踪跡趂春來還趂春光歸去九十韶華能幾許著意留他不住趲栁催花摧紅長翠多少風和雨蜂閒蝶怨盡憑枝上鶯語歸櫂去去難留桃花浪暖緑漲迷津浦回首重城天樣逺人在重城深處惜别愁分凝眸有淚總寄陽關句不堪腸斷恨隨江水東注又乙未白蓮待廷對斜風疏雨正無聊情緒天涯寒食烟重雲嬌春爛漫郤得輕寒邀勒栁褪鵝黃池添鴨緑桃杏渾狼籍亂山深處尚留些子春色海燕未便歸來踏青鬬草誰與同尋覓杜宇多情芳樹裏只管聲聲歷歷似勸行人不如及早作箇歸消息休教腸斷夢魂空費思憶又乙未中元自栁州過白蓮曉風清暑映湖光如練山光如染十里荷花香滿路飛蓋斜欹妝面一葉扁舟數聲柔櫓陡覺紅塵逺六橋三塔恍然圖畫中見因念當日三賢兩山佳處應也經行遍琢月吟風無限句景物隨人俱顯賀監風流𤣥真清致我亦情非淺漁蓑投老利名何用深羡又信豐賦茉莉化工何意向天涯海嶠有花清絶縞袂緑裳無俗韻不畏炎荒煩熱玉骨無塵氷姿有豔雅淡天然别真香冶態未饒紅紫春色底事流落江南水仙兄弟端自難優劣瘴雨蠻烟魂夢逺寧識溪橋霜雪薝蔔同芳素馨為伴百和清芬爇凄然風露夜凉香泛明月又萬載龍江眼界平生奇觀愛登高臨逺尋幽選勝欲上層巔窮望眼一半崎嶇危徑萬瓦鱗鱗四山簇簇咫尺疏林映山川城郭恍然多少清興殘照斜斂餘紅橫陳平逺一抹輕烟暝何處飛來雙白鷺㸃破遙空澄瑩鶴嶺雲平龍江波渺不羡瀟湘詠襟懷舒曠曲欄倚了還憑又足樂園牡丹韶華婉娩正和風遲日暄妍清晝紫燕黃鸝爭巧語催老芬芳花栁灼灼花王盈盈嬌豔獨殿春光後鶮翎初拆露霑香沁珠溜遙想京洛風流姚黃魏紫間緑如鋪繡小蓋低回雕檻曲車馬紛馳園囿天雨曼珠玉槃金束占得聲名久留連朝暮賞心不厭芳酒促拍滿路花信豐黃師尹跳珠亭栽花春爛漫疊石翠巑岏小亭相對倚數峰寒主人尋勝接竹引清泉鑿破蒼苔地一掬泓澄六花疑是深淵山前六花小池向閒中百慮翛然情事寄鳴絃爐香陪茗碗可忘言噴珠濺雪厯歷聽潺湲塵世知何計不老朱顔靜看日月跳丸又瑞蔭亭贈錦屏苗道人連枝蟠古朩瑞蔭映晴空桃江江上景古今同忙中取靜心地儘從容掃盡荆榛蔽結屋誅茒道人一段家風任烏飛兔走囱囱世事亦何窮官閒民不擾更年豐簞瓢雲水時與話西東真樂誰能識兀坐忘言浩然天地之中永遇樂重明節金昊行秋季商回律天氣佳處瑞應皇家祥開聖旦寶厯綿基祚瑶池人祝鈞天樂奏湛露宴均寰宇萬花覆千官盡醉盛事頓超今古中興天統四三傳序揖遜自歸明主黃屋非心蘿圖有永還付當今主希夷高蹈壽康長保五世祖孫歡聚尊之至千秋令節萬年聖父又甲午走筆和嶽大用梅詞韻秋滿衡臯淡雲籠月晚來風徑一抹殘霞數聲過雁還是黃昏近憑高臨逺倚樓凝睇多少斷愁幽興聽漁村鳴榔隱隱别浦暮烟收暝湘妃起舞芳蘭紉佩約略亂峰雲鬢景物悲凉楚天澄淡過盡歸帆影斜陽低處逺山重疊蕭樹亂鴉成陳空無言欄干憑暖悶懷似困又為盧顯文家金林檎賦日麗風暄暗催春去春尚留戀香褪花梢苔侵栁徑密幄清陰展海棠零亂梨花淡沱初聽鬧空鶯燕有輕盈妍姿靚態緩步閬風仙苑緑叢紅蕚芳鮮柔媚約略試妝深淺細葉來禽長梢戲蝶簇簇枝頭見駝顔鬒髮春愁無力困倚畫屏嬌軟只應怕風欺雨橫落紅萬㸃風入松戌申㳂椴衡永舟泛瀟湘溪山佳處是湘中今古言同平林逺岫渾如畫更漁村返照斜紅兩岸荻風䇿䇿一江秋水溶溶蒼崕石壁景尤雄人自西東利名汨沒黃塵裏又那知清勝無窮何日輕舠蓑笠持竿獨釣西風鳯凰閣巳酉歸舟衡陽作正薰風初扇梅黃暑溽並搖雙漿去程速那更黃流浩渺白浪如屋動歸思離愁萬斛平生奇觀頗快江山寓目日斜雲定晚風熟白鷺飛來㸃破一川明緑展十幅瀟湘畫軸蝶戀花戊戌和鄧南秀栁眼窺春春漸吐又是東風搖曵黃金樹宜入新春聞好語一犂處處催耕雨未有花鬚金縷縷醉夢悠揚似蝶翩躚舞一枕仙遊何處去覺來依舊江南住又已亥同常監游洪陽洞題肯堂壁春到園林能幾許昨夜疏疏過郤催花雨暖日晴嵐原上路雕鞍暫繫芳菲樹仙洞同遊皆勝侣翻憶年時醉裏曾尋句要與龍江春作主翩然又趂東風去又癸卯信豐賦芙蓉剪剪西風催碧樹亂菊殘荷節物驚秋暮緑葉紅苞迎曉露錦屏繡幄圍芳圃塵世鸞驂那肯駐尚憶層城仙苑飛瓊侣能共牡丹爭幾許惜花對景聊為主又道中有簪色菊花百疊霜羅香蕊細嫋嫋埀鈐綴簇黃金碎獨占九秋風露裏芳心不與羣花比采采東籬今古意秀色堪餐更惹闌膏膩不用南山橫紫翠悠然消得因花醉又臨安道中賦梅剪水凌虛飛雪片認得清香雪樹深深見傅粉凝酥眀玉豔含章簷下春風面照影溪橋情不淺羌管聲中疊恨傳幽怨隴首人歸芳信斷萬重雲水江南逺又戊申秋懷夜雨鳴簷聲録蔌薄酒澆愁不那更籌促感舊傷今難舉目無聊獨剪西窗燭彈指光陰如電速富貴功名本自無心逐糲食粗衣隨分足此身安健他何欲又丙辰嫣然賞海棠春入園林新雨過次第芳菲惹起情無那蜀錦青紅初剪破枝頭㸃㸃胭脂顆栁帶隨風金裊娜隱映餘霞燦燦紅雲墮高燭夜寒光照坐只愁沈醉誰扶我又用宜笑之語作解語花枝嬌朵朵不為傷春愛把眉峯鎖宜笑精神偏一個微渦媚靨櫻桃破先自腰肢常裊娜更被新來酒飲頻過火茶飲不歡猶自可臉兒瘦得􅞫娘大鷓鴣天壬辰豫章惠月佛閣烟靄空濛江上春夕陽芳草渡頭情飛紅已逐東風逺嫩緑還因夜雨深情脉脉思沈沈捲簾愁與暮雲平闌干倚遍東西曲杜宇一聲腸斷人又豫章大閲玉帶紅花供奉班裹頭新樣總宜男鬧裝鞍轡青驄馬帖體衣裳紫窄衫雲鬢重黛眉彎內家妝束冠江南輕裘緩帶風流帥錦繡叢邊擁騎還又揖翠晚望榕葉隂隂未著霜淺寒猶試夾衣裳霧濃烟重遙山暗雲淡天低共水長風淅瀝景凄凉亂鴉聲裏又斜陽孤帆落處驚鷗鷺飛映書空鴈字行又七夕一葉驚秋風露清砌蛩初聽傍窗聲人逢役鵲飛烏夜橋渡牽牛織女星銀漢淡暮雲輕新蟾斜挂一鈎明人間天上佳期處凉意還從過雨生又湘江舟中應叔索賦風定江流似鏡平斜陽天外挂微明雲歸逺岫千山暝霧映疏林一抹橫漁火細釣絲輕黃塵撲撲謾爭榮何時