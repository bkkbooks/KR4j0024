家在清江江上住水流愁不去又風雨急紅紫又還狼籍嫩緑團枝苔徑溼簾開雙燕入院靜晝閒人寂一縷水沈烟直心事有誰能㑹得階前芳草碧又常山道中風䇿策山逈暮烟橫白淅瀝穿林翻敗葉羈懷愁倦客問宿荒村山驛誰識離情脉脉鴈足無書孤夜色音塵千里隔又和從善二首花夜雨渺渺緑波南浦擘絮晴雲山外吐凝情誰共語十二玉梯空竚閒却瑣窗朱户久客念歸歸未許寸心愁萬縷又風雨半春鎖緑楊深院幕浪不翻香穗捲輕寒閒便面歸興新來不淺勾引閒愁撩亂一枕春酲誰與管曉鶯驚夢斷東坡引别周誠可相看情未足離觴已催促停歌欲語眉先蹙何期歸太速如今去也無計追逐怎忍聽陽關曲扁舟後夜灘頭宿愁隨烟樹簇愁隨烟樹簇又癸已豫章飛花紅不聚都因夜來雨枝頭冷落情如許東風誰是主看看滿地堆郤香絮但目斷章臺路殘英剝蕊留春住春歸何處去春歸何處去又龍江趙去非席上杯行情意密今宵是何夕行人此别真堪惜愁腸空悶鬱明朝去也回首相憶要留戀如何得無端聚雨飄何急人來心上滴人來心上滴生查子宜春記賓亭别王希白庚梅從隴首傳栁向郵亭折鴛瓦曉霜濃掠面凝寒色相逢意便親欲去如何說我亦是行人更與行人别義萍鄉陽春亭千山擁翠屏一水縈羅帶雨過水痕添雲散山容在亭高景最幽天逈風尤快啼鳥一聲閒喚起情無奈又遲遲春晝長冉冉東風軟寒食乍晴天紅紫芳非遍前峰積翠橫新漲挼藍逺向晚淡烟迷一段屏山展又丙午鐵爐岡回春光不肯留風雨催將去紅逐故園塵緑滿江南樹隂晴寒食天寂寞西郊路芳草織新愁悵望人何處又庭虛任雀喧院靜無人到回首十年非賴得知幾早心隨香篆銷意與梅花好萬事轉頭空一笑吾身老少年遊梅玉壺氷結暮天寒朔吹繞闌干雪破梢頭香傳花外春信入江南巡檐索笑情何限一㸃已微酸待得黃垂冥冥烟雨緑樹裊金丸又氷霜凝凍臘殘時暖律漸推移綵勝羅幡土牛春仗和氣與春回花心栁眼知時節微露向陽枝喜入新春稱心百事如意想都宜小重山農人以夜雨晝晴為夜春樂嵗農家喜夜春朝來收宿霧快新晴雲移日轉午風輕香羅薄暄暖困游人積水滿春塍緑波翻鬱鬱露秧針幸無離緒苦牽情烟林外時聽杜鵑聲霜天曉角三衢道中雨餘風徑霧重千山暝茒舍寒林相映分明是畫圖景去程何日定天逺長安近喚起新愁無盡全沒箇故園信又舟行清溪艤舟砂磧秋淨波澄碧極目青山橫逺懸崖斷擁蒼壁傍岩漁艇集渡頭人物立八景瀟湘真畫雲籠日晚風急江南好天共水水逺與天連天淨水平寒月漾水光月色兩相兼月映水中天人與景人景古難全景若佳時心自快心還樂處景應妍休與俗人言關河令清逺軒晚望亭臯霜重飛葉滿聽西風斷雁閒憑危闌斜陽紅欲斂行子歸期太晚誤髣佛征帆幾㸃水逺連天愁雲遮望眼又已亥宜春舟中江頭伊軋動柔櫓漸楚天欲暮浩蕩輕鷗波間自容與岸蓼汀蘋無緒更滿目蕭疏江樹此意何窮憑誰圖畫取採桑子三月晦必東館大雨連朝雨驟驅春去瓦注盆傾不記初春潤栁催花忒有情春光解有重來日寧耐休爭待得秋深聽你無聊㸃滴聲又櫻桃花梅花謝後櫻花綻淺淺勻紅試手天工百卉千葩一信通餘寒未許開舒妥怨雨愁風結子筠籠萬顆勻圓訝許同浪淘沙杏花絳萼襯輕紅綴簇玲瓏夭桃繁李一時同獨向枝頭春意鬧嬌倚東風飛片入簾櫳粉淡香濃鳳簫聲斷月明中只恐明朝風雨惡燕觜泥融又桃花桃蕚正芳菲初占春時蒸霞燦錦望中迷料出繁枝臨曲沼鸞鑑妝遲蜂蝶正相依天氣融怡空教追憶武陵溪片片漫隨流水去風暖烟霏又栁搖曵萬絲風輕染烟濃鵝黃初褪緑茸茸雨洗雲嬌春向晚雪絮空濛車馬灞橋中别緒囱囱只知攀折怨西東不道曉風殘月岸離恨無窮雙頭蓮令信豐雙連太平和氣兆嘉祥草朩總成雙紅苞翠蓋出橫塘兩兩鬬芬芳幹搖碧玉並青房仙髻擁新妝連枝不解引鸞皇留取映鴛鴦畫堂春梅西真仙子宴瑤池素裳瓊豔氷肌瑞籠香霧撲銖衣鳯翥鸞飛玉骨解凌風露鉛華不涴凝脂戍樓羌管正孤吹月淡烟低南柯子送朱辰州于方壺小隱朩落千山瘦風微一水澄清霜暖日快歸程喚渡沙頭欵欵話離情傍岸漁舟集橫空雁字輕憑闌凝望眼增明一片瀟湘真箇畫難成西江月丁已長沙大閲笳鼓旌旗改色弓刀鎧甲增明攢花簇隊馬蹄輕稟聽元戎號令羊祜輕裘臨陳亞夫細栁屯營觀瞻已聳定王城飛虎威名日振又同蔡受之趙中甫巡城飲于南楚樓渺渺澄清波面依依紫翠山先危欄徙倚對斜陽山影波流蕩漾世事一番醒醉人生幾度炎凉高情收拾付觥觴何處羲皇人上洞仙歌丁丑元夕大雨元宵三五正好嬉遊去梅栁蛾蟬鬬濟楚換鞋兒添頭面只等黃昏恰恨有些子無情風雨心忙腹熱沒頓渾身處急把燈臺炎艾炷做匙婆許蔥油麵灰畫葫蘆更漏轉越煞不停不住待歸去猶自意遲疑但無語空將眼兒厮覷南鄉子尹先之索淨圓子詞元夜景尤殊萬斛金蓮照九衢鎚拍豉湯都賣得爭如甘露杯中萬顆珠應是著工夫腦麝濃熏費小厨不比七夕黃蠟做知無耍底圓兒糖上浮行香子春日遲遲春景熙熙漸郊原芳草萋萋夭桃灼灼楊栁依依見燕喃喃蜂簇簇蝶飛飛閒庭寂寂曲沼漪漪更秋千紅索埀埀遊人隊隊樂意嬉嬉盡醉醺醺歌緩緩語低低卜算子立石道中晴日斂春泥陌上東風軟料峭寒禁花栁閒枉恨春工淺緑漲一江深黛潑千山逺目斷平蕪無際愁數盡征鴻㸃又丙午春即席和從善楊栁褪金絲豔杏搖紅影欲雨還晴二月天春色渾無定曉夢不堪驚午睡新來永一掬歸心萬叠愁空惹長亭恨又和從善籌安堂賞海棠嬌豔醉楊妃輕裊憐飛燕人在昭陽睡足時初試粧深淺一段錦新裁萬里來何逺高燭休教照夜寒媚臉融春豔又和徐師川韻贈歌者緑暗栁藏烟紅淡花經雨更著如花似玉人豔態嬌波注纎手捧瑤巵緩遏歌雲縷只恐鶯花不解留還逐東風去又赴春陵和向伯元送行詞雲斂峭寒輕雨漲春波渺旅枕無堪夢易驚啼鴂聲催曉尚憶故園花紅紫為容好世路崎嶇長短亭來往何時了伊洲三臺丹桂桂華移自雲岩更被靈砂染丹清露溼酡顔醉乘風下臨世間素娥襟韻蕭閒不與羣芳並看簌簌絳綃單覺身輕夢回廣寒坦菴詞
